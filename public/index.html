<!DOCTYPE html>
<html>
<head>
<title>Statement Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6fb;
}

/* LOGIN */
.login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.login-card {
  background:white;
  padding:30px;
  border-radius:15px;
  width:340px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo {
  font-size:40px;
  margin-bottom:10px;
  color:#3498db;
}

.subtitle {
  font-size:13px;
  color:#777;
  margin-bottom:20px;
}

.login-card input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

.primary-btn {
  width:100%;
  padding:12px;
  background: linear-gradient(90deg,#2575fc,#6a11cb);
  color:white;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* HEADER */
.header {
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container {
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.upload {background:#3498db;color:white;}
.view {background:#2ecc71;color:white;}
.delete {background:#e74c3c;color:white;}
.download {background:#8e44ad;color:white;}

.status {
  padding:4px 8px;
  border-radius:5px;
  color:white;
}

.pending {background:#ff6f00;}
.done {background:#2ecc71;}

.loader {
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="login-card">

    <div class="logo">☁️</div>

    <h2>Linux Labs</h2>
    <p class="subtitle">SSS & AWS Submission Portal — Field Login</p>

    <input id="loginInput" placeholder="Enter Email or ID">

    <button class="primary-btn" onclick="login()">Continue</button>

    <div style="margin-top:10px;font-size:12px;color:#777;">
      Admin → Email | User → ID
    </div>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="header">
  <div>Dashboard</div>
  <div>
    <button onclick="downloadExcel()">Excel</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<input id="search" placeholder="Search..." onkeyup="filterTable()">

<table>
<thead>
<tr>
<th>State</th>
<th>Code</th>
<th>Name</th>
<th>AWS</th>
<th>SSS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<input type="file" id="fileInput" style="display:none"/>
<div class="loader" id="loader">Uploading...</div>

<script>
let token = localStorage.getItem("token");
let role = localStorage.getItem("role");

let selectedFile = null;
let currentCode = "";
let currentType = "";

/* LOGIN */
async function login(){
  const id = document.getElementById("loginInput").value;

  const res = await fetch("/auth/user-login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.message);
    return;
  }

  token = data.token;
  role = data.role;

  localStorage.setItem("token",token);
  localStorage.setItem("role",role);

  startApp();
}

/* START */
function startApp(){
  loginPage.style.display="none";
  app.style.display="block";
  load();
}

/* LOAD */
async function load(){
  tbody.innerHTML="";

  const r = await fetch("/data/list",{headers:{Authorization:"Bearer "+token}});
  const list = await r.json();

  list.forEach(row=>{
    tbody.innerHTML += `
      <tr>
        <td>${row.state}</td>
        <td>${row.code}</td>
        <td>${row.name}</td>

        <td>${renderCell(row.awsUploaded,row.awsFileId,row.code,"AWS")}</td>
        <td>${renderCell(row.sssUploaded,row.sssFileId,row.code,"SSS")}</td>
      </tr>
    `;
  });
}

/* CELL */
function renderCell(uploaded,fileId,code,type){
  if(uploaded){
    return `
      <span class="status done">Submitted</span><br>
      <button class="view" onclick="viewFile('${fileId}')">View</button>
      <button class="download" onclick="downloadFile('${fileId}')">Download</button>
      ${role==="admin" ? `<button class="delete" onclick="deleteFile('${fileId}')">Delete</button>`:""}
    `;
  } else {
    return `
      <span class="status pending">Pending</span><br>
      <button class="upload" onclick="chooseFile('${code}','${type}')">Choose</button>
    `;
  }
}

/* FILE SELECT */
function chooseFile(code,type){
  currentCode=code;
  currentType=type;
  fileInput.click();
}

fileInput.addEventListener("change",function(){
  selectedFile=this.files[0];

  alert("File selected. Click again to upload.");

  submitUpload();
});

/* UPLOAD */
async function submitUpload(){
  const formData=new FormData();
  formData.append("file",selectedFile);
  formData.append("type",currentType);
  formData.append("code",currentCode);

  loader.style.display="flex";

  await fetch("/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:formData
  });

  loader.style.display="none";

  load();
}

/* VIEW */
function viewFile(id){
  window.open(`https://drive.google.com/file/d/${id}/view`);
}

/* DOWNLOAD */
function downloadFile(id){
  window.open(`/data/download/${id}`);
}

/* DELETE */
async function deleteFile(id){
  await fetch(`/data/delete/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  load();
}

/* EXCEL */
function downloadExcel(){
  window.open("/data/excel");
}

/* SEARCH */
function filterTable(){
  const val=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll("tbody tr").forEach(tr=>{
    tr.style.display=tr.innerText.toLowerCase().includes(val)?"":"none";
  });
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.reload();
}

/* AUTO LOGIN */
if(token){
  startApp();
}
</script>

</body>
</html>
